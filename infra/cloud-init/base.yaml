#cloud-config
package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - nginx
  - python3
  - python3-venv
  - python3-pip
  - nodejs
  - npm
  - ufw

users:
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ${deploy_ssh_public_key}

write_files:
  - path: /etc/motd
    permissions: "0644"
    content: |
      Consulting Site host bootstrapped by cloud-init.

runcmd:
  - mkdir -p /opt/consulting-site/shared/env
  - mkdir -p /opt/consulting-site/shared/logs
  - mkdir -p /opt/consulting-site/shared/uploads
  - chown -R deploy:deploy /opt/consulting-site
