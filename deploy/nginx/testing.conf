server {
    listen 443 ssl; # managed by Certbot
    server_name testing.psifunction.com;

    ssl_certificate /etc/letsencrypt/live/testing.psifunction.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/testing.psifunction.com/privkey.pem; # managed by Certbot

    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    include /etc/nginx/snippets/hardening-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    add_header Strict-Transport-Security "max-age=86400" always;

    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    access_log /var/log/nginx/consulting-site-testing.access.log;
    error_log  /var/log/nginx/consulting-site-testing.error.log warn;

    location /static/ {
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        alias /opt/consulting-site/testing/current/app/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /uploads/ {
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        client_max_body_size 20m;
        alias /opt/consulting-site/testing/shared/uploads/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /health {
        access_log off;
        allow all;

        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        proxy_pass http://unix:/opt/consulting-site/testing/shared/run/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/opt/consulting-site/testing/shared/run/gunicorn.sock;

        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
    }
}

server {
    listen 80;
    server_name testing.psifunction.com;
    return 301 https://$host$request_uri;
}