server {
    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    server_name testing.psifunction.com;

    ssl_certificate /etc/letsencrypt/live/testing.psifunction.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/testing.psifunction.com/privkey.pem; # managed by Certbot

    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    include /etc/nginx/snippets/hardening-common.conf;
    include /etc/nginx/snippets/security-headers.conf;

    add_header Strict-Transport-Security "max-age=86400" always;

    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    access_log /var/log/nginx/consulting-site-testing.access.log;
    error_log  /var/log/nginx/consulting-site-testing.error.log warn;

    # Block high-signal exploit and probe paths before they hit Flask
    location ~* ^/(\.env|cgi-bin|wp-admin|wp-login) {
        return 444;
    }

    # Block common sensitive file probes
    location ~* ^/(composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|Dockerfile|docker-compose\.ya?ml|\.git|\.svn|\.hg) {
        return 444;
    }

    # Health endpoint
    location = /health {
        access_log off;
        include proxy_params;
        proxy_pass http://unix:/opt/consulting-site/testing/shared/run/gunicorn.sock;
    }

    # Static assets
    location /static/ {
        alias /opt/consulting-site/testing/current/app/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Main application
    location / {
        limit_req zone=perip burst=20 nodelay;
        include proxy_params;
        proxy_pass http://unix:/opt/consulting-site/testing/shared/run/gunicorn.sock;
    }

    # Optional: kill obvious PHP stream-wrapper probes in query strings
    if ($request_uri ~* "php://") {
        return 444;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name testing.psifunction.com;

    return 301 https://$host$request_uri;
}