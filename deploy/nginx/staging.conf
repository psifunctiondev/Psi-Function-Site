server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name staging.psifunction.com;

    ssl_certificate /etc/letsencrypt/live/staging.psifunction.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.psifunction.com/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    include /etc/nginx/snippets/hardening-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    add_header Strict-Transport-Security "max-age=86400" always;

    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    access_log /var/log/nginx/consulting-site-staging.access.log;
    error_log  /var/log/nginx/consulting-site-staging.error.log warn;

    location ~* (\.env|/cgi-bin|php://) {
        return 444;
    }

    location /static/ {
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        alias /opt/consulting-site/staging/current/app/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /uploads/ {
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        client_max_body_size 20m;
        alias /opt/consulting-site/staging/shared/uploads/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /health {
        access_log off;

        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        proxy_pass http://unix:/opt/consulting-site/staging/shared/run/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://unix:/opt/consulting-site/staging/shared/run/gunicorn.sock;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name staging.psifunction.com;
    return 301 https://$host$request_uri;
}