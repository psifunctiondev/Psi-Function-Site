server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 20m;

    access_log /var/log/nginx/consulting-site.access.log;
    error_log  /var/log/nginx/consulting-site.error.log warn;

    location /static/ {
        alias /opt/consulting-site/current/app/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /uploads/ {
        alias /opt/consulting-site/shared/uploads/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://unix:/run/consulting-site/gunicorn.sock;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
