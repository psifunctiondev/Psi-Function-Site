# Minimal nginx hardening for a small Flask site

# Hide nginx version on error pages and in the Server header
server_tokens off;

# Keep request sizes small unless you truly need more.
# Increase only on locations that need uploads.
client_max_body_size 2m;

# Reduce slow-client exposure
client_header_timeout 10s;
client_body_timeout 15s;
send_timeout 15s;
keepalive_timeout 15s;

# Keep header handling reasonable
large_client_header_buffers 4 8k;
