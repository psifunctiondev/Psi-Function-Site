{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<form method="post" class="mx-auto max-w-md space-y-4 rounded-2xl border border-slate-200 p-6">
  <h1 class="text-2xl font-semibold">Client Login</h1>
  <label class="block">
    <span class="mb-1 block text-sm">Email</span>
    <input type="email" name="email" class="w-full rounded-lg border px-3 py-2">
  </label>
  <label class="block">
    <span class="mb-1 block text-sm">Password</span>
    <input type="password" name="password" class="w-full rounded-lg border px-3 py-2">
  </label>
  <button class="rounded-lg border px-4 py-2">Sign in</button>
</form>
{% endblock %}
