name: Deploy staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o BatchMode=yes "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" 'echo "SSH OK"'

      - name: Rsync source to server
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "node_modules" \
            ./ \
            "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/consulting-site/source/"

      - name: Install systemd service
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            'bash /opt/consulting-site/source/deploy/scripts/install_systemd_service.sh'

      - name: Install nginx site
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            'bash /opt/consulting-site/source/deploy/scripts/install_nginx_site.sh'

      - name: Run deploy
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            'bash /opt/consulting-site/source/deploy/scripts/deploy_release.sh || {
              rc=$?;
              echo "DEPLOY FAILED: collecting immediate diagnostics";
              sudo systemctl status consulting-site.service -l --no-pager || true;
              sudo systemctl show consulting-site.service \
                -p Result -p ExecMainCode -p ExecMainStatus \
                -p User -p Group -p WorkingDirectory -p EnvironmentFile -p ExecStart || true;
              exit $rc;
            }'

      - name: Collect remote diagnostics on failure
        if: failure()
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" '
            echo "===== systemctl status ====="
            sudo systemctl status consulting-site.service -l --no-pager || true
            echo
            echo "===== systemctl show ====="
            sudo systemctl show consulting-site.service \
              -p Result \
              -p ExecMainCode \
              -p ExecMainStatus \
              -p User \
              -p Group \
              -p WorkingDirectory \
              -p EnvironmentFile \
              -p ExecStart \
              -p FragmentPath || true
            echo
            echo "===== unit file ====="
            sudo sed -n "1,200p" /etc/systemd/system/consulting-site.service || true
            echo
            echo "===== env file ====="
            ls -l /opt/consulting-site/shared/env/app.env || true
            echo
            echo "===== current symlink ====="
            ls -l /opt/consulting-site/current || true
            readlink -f /opt/consulting-site/current || true
          '
