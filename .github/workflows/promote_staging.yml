name: Promote to Staging

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA currently live in testing"
        required: true

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  promote-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Check out exact SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Verify testing revision matches requested SHA
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'test "$(cat /opt/consulting-site/testing/current/REVISION)" = "${{ inputs.sha }}"'

      - name: Rsync repository to remote source
        run: |
          rsync -az --delete \
            --exclude '.git' \
            ./ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/consulting-site/source-staging/

      - name: Deploy staging release
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/consulting-site/source-staging && bash deploy/scripts/deploy_release.sh staging ${{ inputs.sha }}"

      - name: Verify staging revision
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "bash /opt/consulting-site/source-staging/deploy/scripts/verify_revision.sh staging ${{ inputs.sha }}"

      - name: Smoke test staging
        run: |
          bash deploy/scripts/smoke_test.sh https://staging.psifunction.com
